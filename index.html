<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life App">
<meta name="theme-color" content="#0a0a0a">
<title>Life App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--bg5:#323232;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--bd3:rgba(255,255,255,0.22);
  --t:#f0ede8;--t2:#9a9690;--t3:#555250;
  --green:#c8f07a;--teal:#8fd4a8;--amber:#f0c87a;--red:#f07a7a;--purple:#b8a4f8;--blue:#7ab8f0;--coral:#f0a87a;
  --serif:'DM Serif Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:12px;--r2:8px;--r3:6px;
  --sb:env(safe-area-inset-bottom,16px);--st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg);color:var(--t);font-family:var(--sans)}
body{max-width:430px;margin:0 auto;min-height:100dvh;padding-bottom:calc(68px + var(--sb))}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(8,8,8,0.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--bd);z-index:200;padding-bottom:var(--sb)}
.nav-inner{display:flex}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;
  border:none;background:none;color:var(--t3);font-family:var(--sans);font-size:9px;font-weight:500;
  cursor:pointer;letter-spacing:.03em;text-transform:uppercase}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nb.on{color:var(--green)}
.screen{display:none}.screen.on{display:block;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.ph{padding:calc(var(--st) + 48px) 20px 16px}
.ph-eye{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.ph-title{font-family:var(--serif);font-size:26px;line-height:1.2;color:var(--t)}
.ph-title em{font-style:italic;color:var(--green)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.sp{padding:0 20px 16px}
.slbl{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin:12px 0 7px}
.divider{height:1px;background:var(--bd);margin:10px 0}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;display:inline-block}
.pill-g{background:rgba(143,212,168,.18);color:var(--teal)}
.pill-a{background:rgba(240,200,122,.18);color:var(--amber)}
.pill-r{background:rgba(240,122,122,.18);color:var(--red)}
.pill-p{background:rgba(184,164,248,.18);color:var(--purple)}
.btn{padding:10px 16px;border-radius:var(--r2);border:1px solid var(--bd2);background:var(--bg3);
  color:var(--t);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:center;display:block}
.btn:active{background:var(--bg4)}
.btn-p{background:var(--green);color:#0a0a0a;border-color:var(--green)}
.btn-sm{padding:6px 12px;font-size:12px;width:auto;display:inline-block}
.btn-del{color:var(--red);border-color:rgba(240,122,122,.3)}
.btn-purple{background:rgba(184,164,248,.15);color:var(--purple);border-color:rgba(184,164,248,.3)}
.tab-row{display:flex;gap:6px;padding:0 20px 12px}
.tab-btn{flex:1;min-width:0;padding:8px 4px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg2);
  color:var(--t2);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;text-align:center}
.tab-btn.on{background:var(--bg4);color:var(--t);border-color:var(--bd3)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bl{font-size:11px;color:var(--t3);width:58px;flex-shrink:0}
.bt{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px;transition:width .5s}
.bv{font-size:11px;color:var(--t3);width:40px;text-align:right;flex-shrink:0}
input[type=text],input[type=number],textarea,select{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);color:var(--t);font-family:var(--sans);font-size:14px;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--bd3)}
textarea{resize:none;line-height:1.6}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bg4);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--green);cursor:pointer}
.chk-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);cursor:pointer;-webkit-user-select:none;user-select:none}
.chk-row:last-child{border-bottom:none}
.chk-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.chk-box.on{background:var(--teal);border-color:var(--teal)}
.chk-box svg{width:11px;height:11px;stroke:#0a0a0a;stroke-width:2.5;fill:none;opacity:0}
.chk-box.on svg{opacity:1}
.chk-lbl{flex:1;font-size:13px;color:var(--t2)}
.chk-row.done .chk-lbl{text-decoration:line-through;color:var(--t3)}
.day-strip{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--bd)}
.day-strip::-webkit-scrollbar{display:none}
.dchip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg2);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.dchip.on{background:var(--green);color:#0a0a0a;border-color:var(--green)}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:9px}
.mc-top{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px}
.mc-ico{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ico-fr{background:rgba(240,200,122,.14)}.ico-ma{background:rgba(143,212,168,.14)}.ico-ab{background:rgba(122,184,240,.14)}
.mc-meta{flex:1;min-width:0}
.mc-type{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.mc-name{font-size:14px;font-weight:500;color:var(--t);line-height:1.3;margin-bottom:5px}
.mc-pills{display:flex;gap:4px;flex-wrap:wrap}
.mc-arr{width:24px;height:24px;border-radius:50%;border:1px solid var(--bd2);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.mc-arr svg{width:12px;height:12px;stroke:var(--t2);fill:none;stroke-width:2;transition:transform .2s}
.mc.open .mc-arr svg{transform:rotate(180deg)}
.mc-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}
.mc.open .mc-body{display:block}
.alt-tog{display:flex;background:var(--bg3);border-radius:var(--r2);padding:3px;margin:10px 0;gap:2px}
.at-btn{flex:1;padding:6px;border:none;background:none;color:var(--t3);font-family:var(--sans);font-size:12px;font-weight:500;border-radius:5px;cursor:pointer}
.at-btn.on{background:var(--bg5);color:var(--t)}
.ing-list{list-style:none;display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.ing-list li{font-size:13px;color:var(--t2);display:flex;align-items:flex-start;gap:5px;line-height:1.5}
.ing-list li::before{content:"·";color:var(--green);font-weight:700;flex-shrink:0}
.steps-ol{list-style:none;display:flex;flex-direction:column;gap:5px}
.steps-ol li{font-size:13px;color:var(--t2);display:flex;gap:8px;line-height:1.55}
.sn{min-width:18px;height:18px;background:var(--bg4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--green);flex-shrink:0;margin-top:1px}
.nwg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.nwc{background:var(--bg3);border-radius:var(--r3);padding:7px 9px}
.nwl{font-size:9px;color:var(--t3);margin-bottom:1px}
.nwv{font-size:14px;font-weight:500;color:var(--t)}
.nwv span{font-size:10px;color:var(--t3);font-weight:400}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);cursor:pointer;margin-bottom:3px}
.shop-item.done{opacity:.35}.shop-item.done .si-name{text-decoration:line-through}
.si-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shop-item.done .si-chk{background:var(--teal);border-color:var(--teal)}
.si-chk svg{width:9px;height:9px;stroke:#0a0a0a;stroke-width:2.5;fill:none;opacity:0}
.shop-item.done .si-chk svg{opacity:1}
.si-name{flex:1;font-size:13px;color:var(--t)}.si-p{font-size:11px;color:var(--t3)}
.ex-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.ex-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.ex-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--t2);flex-shrink:0}
.ex-num.done-ex{background:var(--teal);border-color:var(--teal);color:#0a0a0a}
.ex-info{flex:1}.ex-name{font-size:14px;font-weight:500;color:var(--t);margin-bottom:2px}.ex-sets{font-size:11px;color:var(--t3)}
.ex-arr{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.ex-card.open .ex-arr{transform:rotate(180deg)}
.ex-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}
.ex-card.open .ex-body{display:block}
.set-grid{display:grid;grid-template-columns:28px 1fr 1fr 32px;gap:7px;align-items:center;margin-bottom:8px}
.set-lbl{font-size:11px;color:var(--t3);text-align:center}
.set-in{background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r2);padding:8px;text-align:center;font-size:15px;font-weight:500;color:var(--t);font-family:var(--sans);outline:none;width:100%}
.set-in:focus{border-color:var(--bd3)}
.set-chk{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--bd2);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.set-chk.on{background:var(--teal);border-color:var(--teal)}
.set-chk svg{width:13px;height:13px;stroke:var(--t3);fill:none;stroke-width:2.5}
.set-chk.on svg{stroke:#0a0a0a}
.ex-tip{font-size:12px;color:var(--t3);font-style:italic;line-height:1.5;padding-top:8px;border-top:1px solid var(--bd);margin-top:4px}
.deep-q{background:linear-gradient(135deg,rgba(184,164,248,.1),rgba(122,184,240,.07));border:1px solid rgba(184,164,248,.22);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.dq-eye{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.dq-text{font-family:var(--serif);font-size:16px;color:var(--t);line-height:1.5;font-style:italic}
.mood-row{display:flex;gap:6px;margin-bottom:12px}
.mood-btn{flex:1;padding:10px 2px;border:1px solid var(--bd2);border-radius:var(--r2);background:var(--bg3);font-size:20px;text-align:center;cursor:pointer}
.mood-btn.on{border-color:var(--green);background:rgba(200,240,122,.1)}
.je{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px;cursor:pointer}
.je-body{display:none;padding:0 14px 12px;border-top:1px solid var(--bd)}
.je.open .je-body{display:block}
.je-section{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin:10px 0 4px}
.je-text{font-size:13px;color:var(--t2);line-height:1.6}
.life-goal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.lg-banner{padding:18px 16px 14px;cursor:pointer}
.lg-cat{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.lg-name{font-family:var(--serif);font-size:20px;line-height:1.3;color:var(--t);margin-bottom:6px}
.lg-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.lg-prog-row{display:flex;align-items:center;gap:8px}
.lg-ptrack{flex:1;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.lg-pbar{height:100%;border-radius:2px;transition:width .4s}
.lg-pct{font-size:11px;color:var(--t3);width:32px;text-align:right;flex-shrink:0}
.lg-body{display:none;border-top:1px solid var(--bd);padding:14px 16px}
.life-goal.open .lg-body{display:block}
.next-step{display:flex;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:var(--r2);margin-bottom:6px;align-items:flex-start;cursor:pointer;-webkit-user-select:none;user-select:none}
.ns-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.next-step.done-step .ns-chk{background:var(--green);border-color:var(--green)}
.ns-chk svg{width:9px;height:9px;stroke:#0a0a0a;stroke-width:2.5;fill:none;opacity:0}
.next-step.done-step .ns-chk svg{opacity:1}
.ns-text{font-size:13px;color:var(--t2);line-height:1.5}
.next-step.done-step .ns-text{text-decoration:line-through;color:var(--t3)}
.chat-bubble{padding:10px 13px;border-radius:var(--r);margin-bottom:8px;font-size:13px;line-height:1.6}
.cb-user{background:rgba(200,240,122,.12);border:1px solid rgba(200,240,122,.2);color:var(--t);margin-left:8%}
.cb-ai{background:var(--bg3);border:1px solid var(--bd2);color:var(--t2)}
.typing{display:flex;gap:4px;padding:10px 13px;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:8px;width:60px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:bounce .9s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.book-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:10px;cursor:pointer}
.bc-head{padding:13px 14px;display:flex;gap:12px;align-items:flex-start}
.bc-cover{width:44px;height:62px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:var(--bg3)}
.bc-meta{flex:1;min-width:0}
.bc-title{font-size:14px;font-weight:500;color:var(--t);margin-bottom:2px}
.bc-author{font-size:12px;color:var(--t3);margin-bottom:5px}
.bc-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}
.book-card.open .bc-body{display:block}
.supp-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;-webkit-user-select:none;user-select:none}
.supp-card.taken{border-color:rgba(143,212,168,.35);background:rgba(143,212,168,.05)}
.supp-ico{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.supp-info{flex:1}.supp-name{font-size:14px;font-weight:500;color:var(--t);margin-bottom:2px}
.supp-desc{font-size:12px;color:var(--t2)}.supp-time{font-size:11px;color:var(--t3);margin-top:2px}
.supp-chk{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.supp-card.taken .supp-chk{background:var(--teal);border-color:var(--teal)}
.supp-chk svg{width:11px;height:11px;stroke:#0a0a0a;stroke-width:2.5;fill:none;opacity:0}
.supp-card.taken .supp-chk svg{opacity:1}
</style>
</head>
<body>
<div id="s-dash" class="screen on"></div>
<div id="s-food" class="screen"></div>
<div id="s-train" class="screen"></div>
<div id="s-journal" class="screen"></div>
<div id="s-goals" class="screen"></div>
<div id="s-notes" class="screen"></div>
<nav class="nav"><div class="nav-inner">

<script>
const QUOTES=[
  {t:"Du wirst nicht bestimmt durch das was dir passiert, sondern durch das was du daraus machst.",s:"Epiktet"},
  {t:"Verliere nicht die Zeit damit dein Leben zu planen. Lebe es.",s:"Marc Aurel"},
  {t:"Disziplin bedeutet: wählen zwischen dem was du jetzt willst und dem was du am meisten willst.",s:"Abraham Lincoln"},
  {t:"Ein ruhiger Geist bringt Stärke in Handlungen.",s:"Lao Tzu"},
  {t:"Wer aufgehört hat besser werden zu wollen, hat aufgehört gut zu sein.",s:"Oliver Cromwell"},
  {t:"Das Einzige was du wirklich kontrollieren kannst, ist deine eigene Reaktion.",s:"Marc Aurel"},
  {t:"Der beste Zeitpunkt um anzufangen war gestern. Der zweitbeste ist jetzt.",s:"Unbekannt"},
];
const DAILY_QS=[
  {cat:"🧠 Denkaufgabe",q:"Wenn du dir selbst als Fremder begegnen würdest – was würde dich überraschen?"},
  {cat:"🌍 Perspektive",q:"Welches Problem von heute wird in 5 Jahren noch eine Rolle spielen?"},
  {cat:"😌 Stoisch",q:"Was beschäftigt dich gerade, das komplett außerhalb deiner Kontrolle liegt?"},
  {cat:"💡 Kreativ",q:"Wenn du eine Woche lang nicht scheitern könntest – was würdest du ausprobieren?"},
  {cat:"🎲 Zufall",q:"Beschreibe deinen heutigen Tag in genau 6 Wörtern."},

  if(messagesEl){const typing=document.createElement("div");typing.id="typing-ind";typing.className="typing";typing.innerHTML="<span></span><span></span><span></span>";messagesEl.appendChild(typing);scrollChatDown();}
  const g=S.lifeGoals.find(x=>x.id===topic);
  const sys=`Du bist persönlicher Coach und Assistent. Die Person hat folgende Lebensziele: 1) Blog/YouTube über Bücher & Kultur aufbauen, 2) PR & Marketing Agentur für Influencer gründen, 3) Website-Agentur aufbauen. Sie hat auch einen Ernährungsplan und trainiert Push/Pull/Legs (Di·Sa·So). Antworte auf Deutsch, direkt, ehrlich und motivierend. Keine Floskeln. Konkrete umsetzbare Ratschläge.${g?` Aktuelles Thema: "${g.name}".`:""}`;
  const messages=(S.chatHistory[topic]||[]).slice(-12).map(m=>({role:m.role,content:m.content}));
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages})});
    const data=await resp.json();
    const reply=data.content?.[0]?.text||"Fehler beim Laden der Antwort.";
    document.getElementById("typing-ind")?.remove();
    if(!S.chatHistory[topic])S.chatHistory[topic]=[];
    S.chatHistory[topic].push({role:"assistant",content:reply});save();renderAITab();
  }catch(e){
    document.getElementById("typing-ind")?.remove();
    S.chatHistory[topic]=(S.chatHistory[topic]||[]);S.chatHistory[topic].push({role:"assistant",content:"Verbindungsfehler. Bitte prüfe deinen API Key und die Internetverbindung."});save();renderAITab();
  }
}
function quickNote(){
  if(!S.notes)S.notes=[];
  const txt=prompt("Schnell-Notiz:");if(!txt)return;
  S.notes.unshift({title:txt.slice(0,60),content:txt,cat:"💡 Ideen",date:new Date().toLocaleDateString("de",{day:"numeric",month:"short"})});
  save();
  // Show brief confirmation
  const btn=document.querySelector('[onclick="quickNote()"]');
  if(btn){const orig=btn.textContent;btn.textContent="✓ Gespeichert!";btn.style.background="var(--teal)";setTimeout(()=>{btn.textContent=orig;btn.style.background="var(--green)";},1500);}
}
function renderNotes(){
  if(!S.notes)S.notes=[];if(!S.notesTab)S.notesTab="all";if(!S.noteCategories)S.noteCategories=["💡 Ideen","📋 Aufgaben","✍️ Skripte","📖 Gedanken","🎯 Projekte"];
  const cats=S.noteCategories;
  const filtered=S.notesTab==="all"?S.notes:S.notes.filter(n=>n.cat===S.notesTab);
  document.getElementById("s-notes").innerHTML=`
    <div class="ph"><div class="ph-eye">Dein Workspace</div><div class="ph-title"><em>Notizen</em> & Ideen</div></div>
    <div style="display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none">
      <button onclick="setNotesTab('all')" style="flex-shrink:0;padding:5px 12px;border:1px solid ${S.notesTab==="all"?"var(--bd3)":"var(--bd2)"};border-radius:20px;background:${S.notesTab==="all"?"var(--bg4)":"var(--bg2)"};color:${S.notesTab==="all"?"var(--t)":"var(--t2)"};font-family:var(--sans);font-size:11px;cursor:pointer">Alle (${S.notes.length})</button>
      ${cats.map(c=>`<button onclick="setNotesTab('${c}')" style="flex-shrink:0;padding:5px 12px;border:1px solid ${S.notesTab===c?"var(--bd3)":"var(--bd2)"};border-radius:20px;background:${S.notesTab===c?"var(--bg4)":"var(--bg2)"};color:${S.notesTab===c?"var(--t)":"var(--t2)"};font-family:var(--sans);font-size:11px;cursor:pointer">${c}</button>`).join("")}
    </div>
    <div class="sp" style="padding-top:0">
      <button class="btn btn-p" style="margin-bottom:12px" onclick="newNote()">+ Neue Notiz</button>
      ${!filtered.length?`<div style="text-align:center;padding:40px 20px;color:var(--t3);font-size:14px;line-height:1.8">Noch keine Notizen${S.notesTab!=="all"?" in dieser Kategorie":""}.<br>Tippe auf + um zu starten.</div>`:""}
      ${filtered.map((n,i)=>{const realIdx=S.notes.indexOf(n);return`<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px" id="nc-${realIdx}">
        <div style="padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px" onclick="toggleNote(${realIdx})">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
              <span style="font-size:10px;background:var(--bg3);border-radius:10px;padding:2px 8px;color:var(--t3)">${n.cat}</span>
              <span style="font-size:10px;color:var(--t3)">${n.date}</span>
            </div>
            <div style="font-size:14px;font-weight:500;color:var(--t);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${n.title||"Unbenannte Notiz"}</div>
            <div style="font-size:12px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(n.content||"").slice(0,80)}${(n.content||"").length>80?"…":""}</div>
          </div>
          <div style="font-size:11px;color:var(--t3);flex-shrink:0" id="narr-${realIdx}">▾</div>
        </div>
        <div id="nb-${realIdx}" style="display:none;padding:0 14px 14px;border-top:1px solid var(--bd)">
          <div style="font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin:10px 0 6px">Titel</div>
          <input type="text" value="${n.title||""}" placeholder="Titel..." onchange="updateNote(${realIdx},'title',this.value)" style="margin-bottom:8px">
          <div style="font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:6px">Kategorie</div>
          <select onchange="updateNote(${realIdx},'cat',this.value)" style="margin-bottom:8px">
            ${cats.map(c=>`<option value="${c}"${n.cat===c?" selected":""}>${c}</option>`).join("")}
          </select>
          <div style="font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:6px">Inhalt</div>
          <textarea rows="8" placeholder="Schreib hier alles rein – Ideen, Skripte, Gedanken, To-Dos..." onchange="updateNote(${realIdx},'content',this.value)" style="margin-bottom:8px;font-family:var(--sans)">${n.content||""}</textarea>
          <div style="display:flex;gap:6px">
            <button class="btn btn-purple btn-sm" onclick="aiExpandNote(${realIdx})">🤖 KI-Hilfe</button>
            <button class="btn btn-del btn-sm" onclick="deleteNote(${realIdx})">Löschen</button>
          </div>
        </div>
      </div>`;}).join("")}
    </div>`;
}
function setNotesTab(t){S.notesTab=t;save();renderNotes();}
function newNote(){
  if(!S.notes)S.notes=[];
  const cat=S.notesTab==="all"?"💡 Ideen":S.notesTab;
  S.notes.unshift({title:"",content:"",cat,date:new Date().toLocaleDateString("de",{day:"numeric",month:"short"})});
  save();renderNotes();
  setTimeout(()=>{const b=document.getElementById("nb-0");const arr=document.getElementById("narr-0");if(b){b.style.display="block";}},50);
}
function toggleNote(i){const b=document.getElementById("nb-"+i);const open=b.style.display==="none";b.style.display=open?"block":"none";}
function updateNote(i,field,val){if(!S.notes[i])return;S.notes[i][field]=val;save();}
function deleteNote(i){if(!confirm("Notiz löschen?"))return;S.notes.splice(i,1);save();renderNotes();}
function aiExpandNote(i){
  const n=S.notes[i];if(!S.apiKey){setGoalsTab("ai");go("goals",document.getElementById("nb-goals"));return;}
  const prompt=`Ich habe folgende Notiz geschrieben:\nTitel: ${n.title||"(kein Titel)"}\nKategorie: ${n.cat}\nInhalt: ${n.content||"(noch leer)"}\n\nKannst du mir dabei helfen, diese Idee weiterzuentwickeln, zu strukturieren oder auszubauen?`;
  if(!S.chatHistory)S.chatHistory={};
  if(!S.chatHistory["notes"])S.chatHistory["notes"]=[];
  S.chatHistory["notes"].push({role:"user",content:prompt});
  S.goalsTab="ai";S.aiTopic="notes";save();
  go("goals",document.getElementById("nb-goals"));
  setTimeout(()=>callClaude("notes"),150);
}

function renderWeeklySummary(){
  const el=document.getElementById("gt-weekly");if(!el)return;
  const totalEntries=S.entries.length;
  const recentEntries=S.entries.slice(-7);
  const avgSleep=recentEntries.length?Math.round(recentEntries.reduce((a,e)=>a+(e.sleep||7),0)/recentEntries.length*10)/10:0;
  const moodMap={"😫":1,"😕":2,"😐":3,"😊":4,"😄":5};
  const avgMood=recentEntries.filter(e=>e.mood).length?Math.round(recentEntries.filter(e=>e.mood).reduce((a,e)=>a+(moodMap[e.mood]||3),0)/recentEntries.filter(e=>e.mood).length*10)/10:0;
  const moodEmoji=avgMood>=4.5?"😄":avgMood>=3.5?"😊":avgMood>=2.5?"😐":avgMood>=1.5?"😕":"😫";
  const gymDone=S.habitGoals.find(g=>g.id==="g1")?.streak||0;
  const suppsDone=S.suppStreak||0;
  const lifeProgress=S.lifeGoals.map(g=>g.progress||0);
  const avgProgress=lifeProgress.length?Math.round(lifeProgress.reduce((a,b)=>a+b,0)/lifeProgress.length):0;
  const doneHabits=Object.values(S.habitSubsDone).filter(Boolean).length;
  const weekGoals=S.weeklyGoals||[];
  el.innerHTML=`<div class="sp">
    <div style="background:linear-gradient(135deg,rgba(200,240,122,.1),rgba(143,212,168,.07));border:1px solid rgba(200,240,122,.2);border-radius:var(--r);padding:14px 16px;margin-bottom:14px">
      <div style="font-family:var(--serif);font-size:18px;color:var(--t);margin-bottom:4px">Woche im Überblick</div>
      <div style="font-size:12px;color:var(--t3)">${new Date().toLocaleDateString("de",{day:"numeric",month:"long",year:"numeric"})}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="card" style="margin-bottom:0;text-align:center"><div style="font-size:24px;margin-bottom:4px">${moodEmoji}</div><div style="font-size:11px;color:var(--t3)">Ø Stimmung</div><div style="font-size:14px;font-weight:500;color:var(--t)">${avgMood||"—"}/5</div></div>
      <div class="card" style="margin-bottom:0;text-align:center"><div style="font-size:24px;margin-bottom:4px">😴</div><div style="font-size:11px;color:var(--t3)">Ø Schlaf</div><div style="font-size:14px;font-weight:500;color:var(--t)">${avgSleep||"—"}h</div></div>
      <div class="card" style="margin-bottom:0;text-align:center"><div style="font-size:24px;margin-bottom:4px">📓</div><div style="font-size:11px;color:var(--t3)">Journal-Einträge</div><div style="font-size:14px;font-weight:500;color:var(--t)">${recentEntries.length}</div></div>
      <div class="card" style="margin-bottom:0;text-align:center"><div style="font-size:24px;margin-bottom:4px">🎯</div><div style="font-size:11px;color:var(--t3)">Habits erledigt</div><div style="font-size:14px;font-weight:500;color:var(--t)">${doneHabits}</div></div>
    </div>
    <div class="slbl">Fortschritt Lebensvisionen</div>
    ${S.lifeGoals.map(g=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:12px;color:var(--t2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.name.split(" ").slice(0,3).join(" ")}</div>
      <div style="width:80px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0"><div style="height:100%;background:${g.color};width:${g.progress||0}%"></div></div>
      <div style="font-size:11px;color:var(--t3);width:28px;text-align:right;flex-shrink:0">${g.progress||0}%</div>
    </div>`).join("")}
    <div class="slbl">Ziele für nächste Woche</div>
    <div class="card">
      ${weekGoals.map((wg,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);cursor:pointer" onclick="toggleWeekGoal(${i})">
        <div style="width:18px;height:18px;border-radius:50%;border:1.5px solid ${wg.done?"var(--green)":"var(--bd2)"};background:${wg.done?"var(--green)":"none"};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${wg.done?`<svg width="9" height="9" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="#0a0a0a" stroke-width="2.5"/></svg>`:""}
        </div>
        <span style="flex:1;font-size:13px;color:${wg.done?"var(--t3)":"var(--t2)"};${wg.done?"text-decoration:line-through":""}">${wg.text}</span>
        <button onclick="event.stopPropagation();deleteWeekGoal(${i})" style="border:none;background:none;color:var(--t3);font-size:12px;cursor:pointer">×</button>
      </div>`).join("")}
      ${!weekGoals.length?`<div style="font-size:13px;color:var(--t3);text-align:center;padding:6px 0">Noch keine Wochenziele</div>`:""}
    </div>
    <div style="display:flex;gap:8px;margin-top:6px"><input type="text" id="wg-in" placeholder="Neues Wochenziel..." style="flex:1"><button class="btn btn-sm btn-p" onclick="addWeekGoal()">+</button></div>
    <div class="slbl">Was läuft gut?</div>
    <textarea rows="2" placeholder="Was ist diese Woche gut gelaufen?" onchange="S.weeklyGood=this.value;save()">${S.weeklyGood||""}</textarea>
    <div class="slbl">Was könnte besser laufen?</div>
    <textarea rows="2" placeholder="Was möchte ich nächste Woche verbessern?" onchange="S.weeklyImprove=this.value;save()">${S.weeklyImprove||""}</textarea>
    <button class="btn btn-purple" style="margin-top:10px" onclick="aiWeeklySummary()">🤖 KI-Wochenreflexion</button>
  </div>`;
}
function toggleWeekGoal(i){S.weeklyGoals[i].done=!S.weeklyGoals[i].done;save();renderWeeklySummary();}
function deleteWeekGoal(i){S.weeklyGoals.splice(i,1);save();renderWeeklySummary();}
function addWeekGoal(){const inp=document.getElementById("wg-in");const txt=inp?.value.trim();if(!txt)return;if(!S.weeklyGoals)S.weeklyGoals=[];S.weeklyGoals.push({text:txt,done:false});inp.value="";save();renderWeeklySummary();}
function aiWeeklySummary(){
  if(!S.apiKey){setGoalsTab("ai");return;}
  const recentEntries=S.entries.slice(-7);
  const avgSleep=recentEntries.length?Math.round(recentEntries.reduce((a,e)=>a+(e.sleep||7),0)/recentEntries.length*10)/10:0;
  const prompt=`Bitte erstelle eine kurze Wochenreflexion für mich basierend auf diesen Daten:\n- Journal-Einträge diese Woche: ${recentEntries.length}\n- Ø Schlaf: ${avgSleep}h\n- Gym-Streak: ${S.habitGoals.find(g=>g.id==="g1")?.streak||0} Tage\n- Supplement-Streak: ${S.suppStreak||0} Tage\n- Wochenziele: ${(S.weeklyGoals||[]).map(g=>g.text+(g.done?" ✓":"")).join(", ")||"keine"}\n- Was lief gut: ${S.weeklyGood||"nicht angegeben"}\n- Was verbessern: ${S.weeklyImprove||"nicht angegeben"}\n- Lebensvisionen-Fortschritt: ${S.lifeGoals.map(g=>g.name.split(" ").slice(0,2).join(" ")+": "+g.progress+"%").join(", ")}\n\nGib mir eine ehrliche, motivierende Wochenreflexion mit konkreten Empfehlungen für nächste Woche.`;
  S.aiTopic="weekly";if(!S.chatHistory)S.chatHistory={};
  S.chatHistory["weekly"]=[{role:"user",content:prompt}];
  S.goalsTab="ai";save();setGoalsTab("ai");
  setTimeout(()=>callClaude("weekly"),100);
}

load();renderDash();
</script>
